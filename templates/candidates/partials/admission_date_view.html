{% load jalali_tags %}
<td id="admission-date-cell-{{ app.id }}" 
    hx-get="{% url 'edit_admission_date' app.id %}" 
    hx-trigger="click" 
    hx-target="this"
    hx-swap="outerHTML"
    class="text-xs font-medium text-muted cursor-pointer hover-bg-light"
    title="برای ویرایش تاریخ کلیک کنید"
    style="min-width: 120px;">
    {% if app.admission_date %}
        📅 {{ app.admission_date|to_jalali }}
    {% else %}
        <span class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 px-2 py-1 rounded text-xxs font-semibold">📅 بدون تاریخ (ثبت)</span>
    {% endif %}
</td>
