{% load jalali_tags %}
<td id="stage-state-{{ state.id }}" class="p-2 align-middle bg-light" style="min-width: 165px;">
    <form hx-post="{% url 'update_stage_state' state.id %}" hx-target="#stage-state-{{ state.id }}" hx-swap="outerHTML" class="m-0">
        <div class="mb-1">
            <label class="text-muted text-xxs d-block mb-0.5" style="font-size: 9px;">نمره (از ۱۰۰)</label>
            <input type="number" name="score" value="{{ state.score }}" step="0.1" min="0" max="100" class="form-control form-control-sm text-center font-bold" style="font-size: 11px; padding: 2px 4px;" required>
        </div>
        <div class="mb-1">
            <label class="text-muted text-xxs d-block mb-0.5" style="font-size: 9px;">وضعیت</label>
            <select name="status" class="form-select form-select-sm" style="font-size: 11px; padding: 2px 4px;">
                <option value="PENDING" {% if state.status == 'PENDING' %}selected{% endif %}>در انتظار</option>
                <option value="COMPLETED" {% if state.status == 'COMPLETED' %}selected{% endif %}>قبول شده</option>
                <option value="FAILED" {% if state.status == 'FAILED' %}selected{% endif %}>مردود شده</option>
            </select>
        </div>
        <div class="mb-1">
            <label class="text-muted text-xxs d-block mb-0.5" style="font-size: 9px;">تاریخ انجام</label>
            <input type="text" name="date" id="date_{{ state.id }}" value="{{ state.actual_evaluation_date|to_jalali }}" placeholder="امروز" class="form-control form-control-sm text-center jalali-datepicker-input text-xs" style="font-size: 11px; padding: 2px 4px; border-radius: 6px;" autocomplete="off">
        </div>
        <div class="mb-1 form-check d-flex align-items-center gap-1.5 ps-0">
            <input type="checkbox" name="is_conditional_pass" id="is_conditional_pass_{{ state.id }}" class="form-check-input" {% if state.is_conditional_pass %}checked{% endif %} style="width: 12px; height: 12px; margin: 0;">
            <label for="is_conditional_pass_{{ state.id }}" class="text-danger text-xxs font-semibold cursor-pointer mb-0" style="font-size: 9px; line-height: 1;">ارجاع مشروط (مردود)</label>
        </div>
        <div class="mb-1.5">
            <label class="text-muted text-xxs d-block mb-0.5" style="font-size: 9px;">یادداشت ارزیاب</label>
            <textarea name="notes" class="form-control form-control-sm" rows="1" placeholder="توضیحات..." style="font-size: 10px; padding: 2px 4px;">{{ state.notes }}</textarea>
        </div>
        <div class="d-flex gap-1 justify-content-center">
            <button type="submit" class="btn btn-xs btn-primary py-0.5 px-2" style="font-size: 10px;">ثبت</button>
            <button type="button" class="btn btn-xs btn-outline-secondary py-0.5 px-2" hx-get="{% url 'view_stage_state' state.id %}" hx-target="#stage-state-{{ state.id }}" hx-swap="outerHTML" style="font-size: 10px;">لغو</button>
        </div>
    </form>
    <script>
        if (typeof kamaDatepicker !== 'undefined') {
            kamaDatepicker("date_{{ state.id }}", {
                buttonsColor: '#0052cc',
                markToday: true,
                gotoToday: true,
                twodigit: true,
                closeAfterSelect: true,
                nextButtonIcon: '>',
                previousButtonIcon: '<'
            });
        }
    </script>
</td>
