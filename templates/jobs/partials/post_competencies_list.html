{% if post_competencies %}
<div class="d-flex justify-content-between align-items-center mb-2 px-2">
    <span class="text-xxs font-bold text-muted">لیست شایستگی‌های یافت شده برای پست:</span>
    <button type="button" class="btn btn-xxs btn-outline-primary" onclick="selectAllPostComps();">انتخاب همه</button>
</div>
<div class="d-flex flex-column gap-2" style="max-height: 320px; overflow-y: auto; padding: 4px;">
    {% for comp in post_competencies %}
    <div class="d-flex align-items-center justify-content-between p-2.5 bg-white border border-light rounded-3 hover-shadow-xs">
        <div class="form-check m-0">
            <input class="form-check-input post-comp-checkbox" 
                   type="checkbox" 
                   name="selected_competencies" 
                   value="{{ comp.id }}" 
                   id="comp_{{ comp.id }}" 
                   data-type="{{ comp.competency_type }}"
                   {% if comp.code in selected_codes %}checked{% endif %}
                   onchange="triggerPreviewUpdate();">
            <label class="form-check-label text-xs font-semibold text-dark ms-2" for="comp_{{ comp.id }}">
                {{ comp.title }}
                <span class="text-xxs text-muted font-bold block" style="font-size: 9px; display: block; margin-top: 2px;">کد: {{ comp.code }}</span>
            </label>
        </div>
        <div class="d-flex gap-1 flex-shrink-0">
            <span class="badge bg-secondary bg-opacity-10 text-secondary font-bold text-xxs px-2 py-1">{{ comp.get_competency_type_display }}</span>
            <span class="badge bg-primary bg-opacity-10 text-primary font-bold text-xxs px-2 py-1">سطح: {{ comp.level }}</span>
            <span class="badge bg-warning bg-opacity-10 text-warning font-bold text-xxs px-2 py-1">اهمیت: {{ comp.importance }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center text-muted py-5 text-xs">برای پست انتخاب شده هیچ شایستگی در بانک یافت نشد.</div>
{% endif %}
