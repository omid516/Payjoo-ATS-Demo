{% if post_competencies %}
<div class="d-flex justify-content-between align-items-center mb-2 px-2">
    <span class="text-xxs font-bold text-muted">لیست شایستگی‌های یافت شده برای پست:</span>
    <div class="d-flex gap-1">
        <button type="button" class="btn btn-xxs btn-outline-primary" style="padding: 2px 6px; font-size: 10px;" onclick="selectAllPostComps();">انتخاب همه</button>
        <button type="button" class="btn btn-xxs btn-outline-secondary" style="padding: 2px 6px; font-size: 10px;" onclick="deselectAllPostComps();">حذف انتخاب‌ها</button>
    </div>
</div>

<!-- کادر جستجوی متنی -->
<div class="mb-2 px-1">
    <input type="text"
           id="post-comp-search-input"
           class="form-control form-control-sm text-xs font-semibold"
           placeholder="🔍 جستجوی عنوان یا کد شایستگی..."
           style="border-radius: 6px;"
           onkeyup="filterPostCompetencies()">
</div>

<!-- فیلتر بر اساس نوع شایستگی -->
<div class="mb-3 p-2 bg-light bg-opacity-75 border border-light rounded-3" style="direction: rtl;">
    <div class="d-flex justify-content-between align-items-center mb-1.5 px-1">
        <span class="text-xxs font-bold text-secondary">🔍 فیلتر نوع شایستگی:</span>
        <div class="d-flex gap-1.5" style="font-size: 10px;">
            <button type="button" class="btn btn-link p-0 text-primary font-bold text-decoration-none" style="font-size: 10px;" onclick="toggleAllFilters(true)">انتخاب همه</button>
            <span class="text-muted">|</span>
            <button type="button" class="btn btn-link p-0 text-secondary font-bold text-decoration-none" style="font-size: 10px;" onclick="toggleAllFilters(false)">حذف همه</button>
        </div>
    </div>
    <div class="d-flex flex-wrap gap-1">
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_KN" value="KN" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_KN">دانش</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_SK" value="SK" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_SK">مهارت</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_AB" value="AB" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_AB">توانایی</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_GE" value="GE" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_GE">رفتاری</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_ST" value="ST" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_ST">ارزش‌ها</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_PR" value="PR" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_PR">گردشکار</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_CQ" value="CQ" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_CQ">صلاحیت</label>
        </div>
        <div class="form-check-inline m-0">
            <input type="checkbox" class="btn-check type-filter-checkbox" id="filter_IN" value="IN" checked onchange="filterPostCompetencies()">
            <label class="btn btn-xxs btn-outline-primary px-1.5 py-0.5 font-semibold" style="font-size: 9px; border-radius: 4px;" for="filter_IN">علایق</label>
        </div>
    </div>
</div>

<div class="d-flex flex-column gap-2" style="max-height: 320px; overflow-y: auto; padding: 4px;">
    {% for comp in post_competencies %}
    <div class="post-comp-item d-flex align-items-center justify-content-between p-2.5 bg-white border border-light rounded-3 hover-shadow-xs" data-type="{{ comp.competency_type }}">
        <div class="form-check m-0">
            <input class="form-check-input post-comp-checkbox" 
                   type="checkbox" 
                   name="selected_competencies" 
                   value="{{ comp.id }}" 
                   id="comp_{{ comp.id }}" 
                   data-type="{{ comp.competency_type }}"
                   {% if comp.code in selected_codes %}checked{% endif %}
                   onchange="triggerPreviewUpdate(true);">
            <label class="form-check-label text-xs font-semibold text-dark ms-2" for="comp_{{ comp.id }}">
                {{ comp.title }}
                <span class="text-xxs text-muted font-bold block" style="font-size: 9px; display: block; margin-top: 2px;">کد: {{ comp.code }}</span>
            </label>
        </div>
        <div class="d-flex gap-1 flex-shrink-0">
            <span class="badge bg-secondary bg-opacity-10 text-secondary font-bold text-xxs px-2 py-1">{{ comp.get_competency_type_display }}</span>
            <span class="badge bg-primary bg-opacity-10 text-primary font-bold text-xxs px-2 py-1">سطح: {{ comp.level }}</span>
            <span class="badge bg-warning bg-opacity-10 text-warning font-bold text-xxs px-2 py-1">اهمیت: {{ comp.importance }}</span>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center text-muted py-5 text-xs">برای پست انتخاب شده هیچ شایستگی در بانک یافت نشد.</div>
{% endif %}
